name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m ruff check app tests
      - run: python -m ruff format --check app tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m mypy app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m bandit -q -r app
      - run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

  test:
    runs-on: ubuntu-latest
    # postgres como service: os testes de integração (tests/test_repository_postgres.py)
    # usam testcontainers e detectam o Docker do runner automaticamente; se o
    # daemon não estiver acessível eles fazem skip — a suíte continua verde.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage (fail_under=80)
        run: python -m pytest -q --cov=app --cov-report=term-missing
