id: "llm_integration"
name: "Agente 3 — Integração com LLM (OpenRouter + fallback Gemini)"
description: "Implementa o cliente LLM resiliente com retry, circuit breaker e fallback."
version: "1.0.0"

model:
  provider: "llm_agent"
  deployment: "default"
  temperature: 0.2

prompts:
  system_path: "system.md"
  context_paths:
    - "shared/context/base_context.md"

capabilities:
  - "coding"
  - "llm_integration"
  - "resilience_patterns"
  - "testing"

tools:
  allow:
    - "filesystem"
    - "shell"
    - "web_search"

autonomy_level: "L3"

execution:
  phase: 2
  depends_on: ["api_scaffold"]

constraints:
  max_steps: 20
  token_budget: 20000
