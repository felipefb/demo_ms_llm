id: "resilience_design"
name: "Agente 11 — Resiliência a falhas de dependências"
description: "Escreve a seção Resiliência e Falhas de Dependências de docs/architecture.md."
version: "1.0.0"

model:
  provider: "llm_agent"
  deployment: "default"
  temperature: 0.3

prompts:
  system_path: "system.md"
  context_paths:
    - "shared/context/base_context.md"

capabilities:
  - "resilience_patterns"
  - "architecture"
  - "documentation"

tools:
  allow:
    - "filesystem"
    - "web_search"

autonomy_level: "L3"

execution:
  phase: 5
  depends_on: ["quality_ci"]

constraints:
  max_steps: 12
  token_budget: 15000
